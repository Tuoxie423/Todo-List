<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>任务台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Practice Lab</p>
          <h1 id="page-title">任务台</h1>
          <p class="hero-copy">当前房间：<strong id="roomName">加载中</strong></p>
        </div>

        <div class="hero-actions">
          <div class="status-card" aria-live="polite">
            <span class="status-dot" id="statusDot"></span>
            <div>
              <p class="status-label">Gin 后端状态</p>
              <strong id="apiStatus">连接中</strong>
            </div>
          </div>
          <button class="ghost-button" id="changeRoomButton" type="button">切换房间</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="summary-panel">
          <div class="metric">
            <span id="totalCount">0</span>
            <p>总任务</p>
          </div>
          <div class="metric">
            <span id="doneCount">0</span>
            <p>已完成</p>
          </div>
          <div class="metric accent">
            <span id="progressRate">0%</span>
            <p>进度</p>
          </div>
        </aside>

        <div class="board-grid">
          <section class="task-panel" aria-labelledby="learning-title" data-kind="learning">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Study</p>
                <h2 id="learning-title">学习清单</h2>
              </div>
              <button class="ghost-button" data-action="refresh" type="button">刷新</button>
            </div>

            <form class="task-form" data-kind="learning">
              <label class="field">
                <span>任务标题</span>
                <input name="title" type="text" maxlength="40" placeholder="例如：新增一个查询接口" required />
              </label>
              <label class="field short">
                <span>难度</span>
                <select name="level">
                  <option>基础</option>
                  <option>进阶</option>
                  <option>挑战</option>
                </select>
              </label>
              <button class="primary-button" type="submit">添加</button>
            </form>

            <div class="message" data-role="message" role="status"></div>
            <ul class="task-list" data-role="task-list" aria-live="polite"></ul>
          </section>

          <section class="task-panel optimization-panel" aria-labelledby="optimization-title" data-kind="optimization">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Tasks</p>
                <h2 id="optimization-title">任务清单</h2>
              </div>
              <button class="ghost-button" data-action="refresh" type="button">刷新</button>
            </div>

            <form class="task-form" data-kind="optimization">
              <label class="field">
                <span>任务标题</span>
                <input name="title" type="text" maxlength="40" placeholder="例如：整理部署步骤" required />
              </label>
              <label class="field short">
                <span>难度</span>
                <select name="level">
                  <option>基础</option>
                  <option>进阶</option>
                  <option>挑战</option>
                </select>
              </label>
              <button class="primary-button" type="submit">添加</button>
            </form>

            <div class="message" data-role="message" role="status"></div>
            <ul class="task-list" data-role="task-list" aria-live="polite"></ul>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
